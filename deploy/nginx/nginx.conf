user  nginx;

worker_processes  auto;

error_log  /var/log/nginx/error.log warn;



events { worker_connections 1024; }



http {

    include       /etc/nginx/mime.types;

    default_type  application/octet-stream;

    sendfile      on;

    keepalive_timeout 65;

    client_max_body_size 20m;          # request body limit (edge concern)



    # Coarse rate limiting; auth endpoints get a stricter zone below.

    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/s;



    upstream gateway      { server gateway:8080; }



    server {

        listen 80;

        server_name _;



        # Basic security headers.

        add_header X-Content-Type-Options nosniff always;

        add_header X-Frame-Options DENY always;

        add_header Referrer-Policy no-referrer-when-downgrade always;



        # Logto login UI / OIDC endpoints (mobile + web OIDC go here).

        location /oidc/   { proxy_pass http://logto:3001; include /etc/nginx/proxy.conf; }

        location /logto/  { proxy_pass http://logto:3001; include /etc/nginx/proxy.conf; }



        # Admin SPA static assets (build: pnpm --filter @ting/admin build).

        location = /admin {

            return 302 /admin/items;

        }

        location /admin/ {

            root /usr/share/nginx/html;

            try_files $uri $uri/ /admin/index.html;

        }



        # Auth integration APIs: stricter rate limit, via Gateway (anon whitelist + internal token).

        location /v1/auth/ {

            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://gateway;

            include /etc/nginx/proxy.conf;

        }



        # Logto webhooks: public URL hits Gateway (anon + Logto HMAC at auth-service).

        location = /internal/webhooks/logto {

            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://gateway;

            include /etc/nginx/proxy.conf;

        }



        # Everything else -> Gateway (BFF, /v1/*, health at edge).

        location / {

            limit_req zone=general burst=100 nodelay;

            proxy_pass http://gateway;

            include /etc/nginx/proxy.conf;

        }

    }

}


