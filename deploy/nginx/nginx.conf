user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20m;          # request body limit (edge concern)

    # Coarse rate limiting; auth endpoints get a stricter zone below.
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/s;

    upstream gateway      { server gateway:8080; }
    upstream auth_service { server auth-service:8080; }
    upstream logto        { server logto:3001; }

    server {
        listen 80;
        server_name _;

        # Basic security headers.
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer-when-downgrade always;

        # Logto login UI / OIDC endpoints (mobile + web OIDC go here).
        location /oidc/   { proxy_pass http://logto; include /etc/nginx/proxy.conf; }
        location /logto/  { proxy_pass http://logto; include /etc/nginx/proxy.conf; }

        # Auth endpoints are high-risk (SMS cost): stricter rate limit.
        location /v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://auth_service;
            include /etc/nginx/proxy.conf;
        }

        # Mini-program login -> auth-service (code2session).
        location /v1/auth/miniprogram/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://auth_service;
            include /etc/nginx/proxy.conf;
        }

        # Everything else -> Gateway.
        location / {
            limit_req zone=general burst=100 nodelay;
            proxy_pass http://gateway;
            include /etc/nginx/proxy.conf;
        }
    }
}
