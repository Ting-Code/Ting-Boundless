# Production on Tencent CVM — images from TCR, data stores are managed (TencentDB / Redis / COS).
#
# On server:
#   export TCR_REGISTRY=ccr.ccs.tencentyun.com/<namespace>/ting-boundless  # same as GitHub secret TCR_IMAGE_PREFIX
#   export IMAGE_TAG=<git-sha>
#   docker compose -f deploy/docker-compose.prod.yml --env-file .env pull
#   docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d

name: ting-boundless-prod

x-prod-env: &prod-env
  APP_ENV: production

services:
  nginx:
    image: ${TCR_REGISTRY}/nginx:${IMAGE_TAG}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/server-locations.inc:/etc/nginx/server-locations.inc:ro
      - ./nginx/ssl-params.inc:/etc/nginx/ssl-params.inc:ro
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf:ro
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    image: ${TCR_REGISTRY}/gateway:${IMAGE_TAG}
    env_file: ../.env
    environment:
      <<: *prod-env
      HTTP_ADDR: :8080
      USER_SERVICE_URL: http://user-service:8081
      BUSINESS_SERVICE_URL: http://business-service:3005
      FILE_SERVICE_URL: http://file-service:8083
      AUTH_SERVICE_URL: http://auth-service:8084
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL}
      GATEWAY_BFF_DEV_LOGIN: "false"
    depends_on:
      - user-service
      - file-service
      - auth-service
      - business-service
    restart: unless-stopped

  business-service:
    image: ${TCR_REGISTRY}/business-service:${IMAGE_TAG}
    env_file: ../.env
    environment:
      <<: *prod-env
      BUSINESS_HTTP_ADDR: :3005
      NODE_ENV: production
    restart: unless-stopped

  auth-service:
    image: ${TCR_REGISTRY}/auth-service:${IMAGE_TAG}
    env_file: ../.env
    environment:
      <<: *prod-env
    restart: unless-stopped

  user-service:
    image: ${TCR_REGISTRY}/user-service:${IMAGE_TAG}
    env_file: ../.env
    environment:
      <<: *prod-env
    restart: unless-stopped

  file-service:
    image: ${TCR_REGISTRY}/file-service:${IMAGE_TAG}
    env_file: ../.env
    environment:
      <<: *prod-env
    restart: unless-stopped

  audit-service:
    image: ${TCR_REGISTRY}/audit-service:${IMAGE_TAG}
    env_file: ../.env
    environment:
      <<: *prod-env
      AUDIT_POSTGRES_USER: ${AUDIT_POSTGRES_USER:-audit_writer}
      AUDIT_POSTGRES_PASSWORD: ${AUDIT_POSTGRES_PASSWORD}
    restart: unless-stopped

  worker:
    image: ${TCR_REGISTRY}/worker:${IMAGE_TAG}
    env_file: ../.env
    environment:
      <<: *prod-env
    restart: unless-stopped
