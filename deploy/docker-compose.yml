# V1 stack: single host, Docker Compose. Build context is the repo root.
# Run from repo root: docker compose -f deploy/docker-compose.yml up -d --build

name: ting-boundless

x-service-build: &service-build
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  env_file: ../.env
  restart: unless-stopped

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on: [gateway, auth-service]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf:ro
    restart: unless-stopped

  gateway:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: gateway }
    depends_on: [user-service, business-service, file-service]

  auth-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: auth-service }
    depends_on: [postgres, redis]

  user-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: user-service }
    depends_on: [postgres, redis]

  business-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: business-service }
    depends_on: [postgres, redis, rabbitmq]

  file-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: file-service }
    depends_on: [postgres, minio]

  audit-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: audit-service }
    depends_on: [postgres]

  worker:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: worker }
    depends_on: [rabbitmq]

  # --- Identity ---
  logto:
    image: svhd/logto:latest
    env_file: ../.env
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/logto_db
    depends_on: [postgres]
    restart: unless-stopped

  # --- Data / infra ---
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=app_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/collector.yaml"]
    volumes:
      - ./otel/collector.yaml:/etc/otel/collector.yaml:ro
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
