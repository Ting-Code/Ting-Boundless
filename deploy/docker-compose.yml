# Stateless application services — safe to redeploy independently.
#
# Local dev (with local infra):
#   docker compose -f deploy/docker-compose.infra.yml -f deploy/docker-compose.yml up -d --build
#   or: make up
#
# Production / staging (managed data stores):
#   docker compose -f deploy/docker-compose.yml up -d --build
#   Set POSTGRES_HOST, REDIS_ADDR, RABBITMQ_URL, S3_ENDPOINT to managed endpoints in .env.
#
# Build context is the repo root.

name: ting-boundless

x-service-build: &service-build
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  env_file: ../.env
  restart: unless-stopped

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on: [gateway, auth-service]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf:ro
    restart: unless-stopped

  gateway:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: gateway }
    depends_on: [user-service, business-service, file-service]

  auth-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: auth-service }

  user-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: user-service }

  business-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: business-service }

  file-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: file-service }

  audit-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: audit-service }

  worker:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: worker }

  logto:
    image: svhd/logto:latest
    env_file: ../.env
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${LOGTO_DB:-logto_db}
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/collector.yaml"]
    volumes:
      - ./otel/collector.yaml:/etc/otel/collector.yaml:ro
    restart: unless-stopped
