# Stateless application services — safe to redeploy independently.
#
# Local dev (with local infra):
#   docker compose -f deploy/docker-compose.infra.yml -f deploy/docker-compose.yml up -d --build
#   or: make up
#
# Production / staging (managed data stores):
#   docker compose -f deploy/docker-compose.yml up -d --build
#   Set POSTGRES_HOST, REDIS_ADDR, RABBITMQ_URL, S3_ENDPOINT to managed endpoints in .env.
#
# Build context is the repo root.

name: ting-boundless

x-service-build: &service-build
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  env_file: ../.env
  restart: unless-stopped

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on: [gateway, auth-service]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/server-locations.inc:/etc/nginx/server-locations.inc:ro
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf:ro
      - ../node/apps/admin/dist:/usr/share/nginx/html/admin:ro
    restart: unless-stopped

  gateway:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: gateway }
    depends_on: [user-service, file-service, auth-service, audit-service]
    environment:
      USER_SERVICE_URL: http://user-service:8081
      BUSINESS_SERVICE_URL: http://host.docker.internal:3005
      FILE_SERVICE_URL: http://file-service:8083
      AUTH_SERVICE_URL: http://auth-service:8084
      AUDIT_SERVICE_URL: http://audit-service:8085
      SITE_SERVICE_URL: http://host.docker.internal:3006
      REDIS_ADDR: redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"

  auth-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: auth-service }

  user-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: user-service }

  file-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: file-service }

  audit-service:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: audit-service }

  worker:
    <<: *service-build
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args: { SERVICE: worker }
    depends_on: [audit-service]
    environment:
      AUDIT_SERVICE_URL: http://audit-service:8085

  logto:
    image: ghcr.io/logto-io/logto:latest
    env_file: ../.env
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${LOGTO_DB:-logto_db}
      - ENDPOINT=http://127.0.0.1:3001
      - ADMIN_ENDPOINT=http://127.0.0.1:3002
    entrypoint: ["sh", "-c", "npm run alteration deploy latest && npm run cli db seed -- --swe --disable-admin-pwned-password-check && npm start"]
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    command: ["--config=/etc/otel/collector.yaml"]
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./otel/collector.yaml:/etc/otel/collector.yaml:ro
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./otel/tempo.yaml:/etc/tempo.yaml:ro
      - tempodata:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./otel/loki.yaml:/etc/loki/loki.yaml:ro
      - lokidata:/loki
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.0
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
      otel-collector:
        condition: service_started
    ports:
      - "3003:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./otel/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped

volumes:
  tempodata:
  lokidata:
