# Minimal OpenTelemetry Collector for V1.
# Services send OTLP here; the collector fans out to backends. Keep it light in
# V1 (debug exporter), wire Loki/Prometheus/Tempo in V2.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 20

exporters:
  debug:
    verbosity: normal
  # V2: add prometheus, loki, otlp/tempo exporters here.

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
