name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-setup-action@v1

      - name: Buf lint and generate
        working-directory: platform-contracts
        run: |
          buf lint
          buf generate
          test -f ../go/gen/go/ting/common/v1/identity.pb.go
          test -f ../go/gen/go/ting/common/v1/error.pb.go
          test -f ../go/gen/go/ting/common/v1/audit.pb.go

      - name: Buf breaking (PR)
        if: github.event_name == 'pull_request'
        working-directory: platform-contracts
        run: buf breaking --against '.git#branch=main'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: OpenAPI lint (Redocly)
        working-directory: platform-contracts
        run: npx --yes @redocly/cli@1.34.3 lint openapi/*.yaml

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Install oasdiff
        run: go install github.com/tufin/oasdiff/cmd/oasdiff@v1.10.21

      - name: OpenAPI breaking (PR)
        if: github.event_name == 'pull_request'
        run: bash scripts/oasdiff-breaking.sh

  go:
    runs-on: ubuntu-latest
    needs: [contracts]
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1

      - name: Generate proto stubs
        working-directory: platform-contracts
        run: buf generate

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build, vet, test
        run: |
          go build ./...
          go vet ./...
          go test ./...

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          golangci-lint run

  image-scan:
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service images
        run: |
          for svc in gateway user-service auth-service; do
            docker build -f deploy/Dockerfile --build-arg SERVICE=$svc -t "ting/${svc}:ci" .
          done

      - name: Trivy scan (gateway)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ting/gateway:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy scan (user-service)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ting/user-service:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy scan (auth-service)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ting/auth-service:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy scan Dockerfile
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: deploy/Dockerfile
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Prepare databases
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          CREATE USER ting WITH PASSWORD 'change-me' CREATEDB;
          CREATE USER audit_writer WITH PASSWORD 'change-me-audit';
          CREATE DATABASE app_db OWNER ting;
          CREATE DATABASE audit_db OWNER ting;
          GRANT CONNECT ON DATABASE audit_db TO audit_writer;
          SQL

      - name: Apply migrations
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_USER: ting
          POSTGRES_PASSWORD: change-me
          POSTGRES_DB: app_db
          AUDIT_DB: audit_db
        run: go run ./cmd/migrate

      - name: Integration test (audit_writer append-only)
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_USER: ting
          POSTGRES_PASSWORD: change-me
          AUDIT_DB: audit_db
          AUDIT_POSTGRES_USER: audit_writer
          AUDIT_POSTGRES_PASSWORD: change-me-audit
        run: go test -tags=integration ./services/audit-service/internal/store/...

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: node/pnpm-lock.yaml

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm generate:api
          pnpm test
          pnpm typecheck
          pnpm --filter @ting/logger build
          pnpm --filter @ting/api build
          pnpm --filter @ting/business-service build
          pnpm --filter @ting/admin build
