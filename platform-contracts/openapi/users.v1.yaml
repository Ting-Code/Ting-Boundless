openapi: 3.0.3
info:
  title: Ting Boundless User API
  version: 1.0.0
  description: User profile under /v1/users/* (Go user-service).

servers:
  - url: http://127.0.0.1:8080
    description: Gateway (local)

paths:
  /v1/users/:
    get:
      operationId: listTenantUsers
      summary: List users in the current tenant (admin role)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'

  /v1/users/me:
    get:
      operationId: getUserMe
      summary: Get or create profile for the authenticated user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
    patch:
      operationId: updateUserMe
      summary: Update display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'

components:
  schemas:
    TenantUser:
      type: object
      required: [user_id, tenant_id, display_name, created_at, updated_at]
      properties:
        user_id:
          type: string
        tenant_id:
          type: string
        display_name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ListUsersResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/TenantUser'

    UserMeResponse:
      type: object
      required: [user_id, tenant_id, display_name, roles, created_at, updated_at]
      properties:
        user_id:
          type: string
        tenant_id:
          type: string
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateUserProfileRequest:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 200
