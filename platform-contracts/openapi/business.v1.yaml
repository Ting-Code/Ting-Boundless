openapi: 3.0.3
info:
  title: Ting Boundless Business API
  version: 1.0.0
  description: Domain CRUD under /v1/business/* (Nest business-service).

servers:
  - url: http://127.0.0.1:8080
    description: Gateway (local)

paths:
  /v1/business/ping:
    get:
      operationId: businessPing
      summary: Smoke test
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessPingResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'

  /v1/business/me:
    get:
      operationId: businessMe
      summary: Echo trusted identity from Gateway headers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessMeResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'

  /v1/business/items:
    get:
      operationId: listBusinessItems
      summary: List business items for the current tenant
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListItemsResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
    post:
      operationId: createBusinessItem
      summary: Create a business item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateItemResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'

  /v1/business/items/{id}:
    get:
      operationId: getBusinessItem
      summary: Get a business item by id (tenant-scoped)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetItemResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
    patch:
      operationId: updateBusinessItem
      summary: Update a business item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetItemResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
    delete:
      operationId: deleteBusinessItem
      summary: Delete a business item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'

components:
  schemas:
    BusinessPingResponse:
      type: object
      required: [ok, service]
      properties:
        ok:
          type: boolean
          enum: [true]
        service:
          type: string

    BusinessMeResponse:
      type: object
      required: [user_id, tenant_id, roles, scopes, subject, request_id]
      properties:
        user_id:
          type: string
        tenant_id:
          type: string
        roles:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
        subject:
          type: string
        request_id:
          type: string

    BusinessItem:
      type: object
      required: [id, tenant_id, title, body, created_by, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
        title:
          type: string
        body:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ListItemsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BusinessItem'

    CreateItemRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          maxLength: 5000

    CreateItemResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/BusinessItem'

    GetItemResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/BusinessItem'

    UpdateItemRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          maxLength: 5000
