openapi: 3.0.3
info:
  title: Ting Boundless Audit API
  version: 1.0.0
  description: Audit event query under /v1/audit/* (Go audit-service). Requires admin role.

servers:
  - url: http://127.0.0.1:8080
    description: Gateway (local)

paths:
  /v1/audit/events:
    get:
      operationId: listAuditEvents
      summary: List recent audit events (tenant-scoped when applicable)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: type
          in: query
          description: Filter by event type (e.g. business.item.created)
          schema:
            type: string
        - name: source
          in: query
          description: Filter by CloudEvents source (e.g. gateway, business-service)
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuditEventsResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (admin role required)
          content:
            application/json:
              schema:
                $ref: 'common.v1.yaml#/components/schemas/ErrorEnvelope'

components:
  schemas:
    AuditEvent:
      type: object
      required: [id, source, type, time, received_at]
      properties:
        id:
          type: string
        source:
          type: string
        type:
          type: string
        subject:
          type: string
        time:
          type: string
          format: date-time
        tenant_id:
          type: string
        actor_user_id:
          type: string
        data:
          type: object
          additionalProperties: true
        received_at:
          type: string
          format: date-time

    ListAuditEventsResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
